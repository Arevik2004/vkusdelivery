<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню - Доставка еды</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>🍕 ВкусDelivery</h1>
                </div>
                <div class="nav-links">
                    <a href="index.html">Главная</a>
                    <a href="catalog.html" class="active">Меню</a>
                    <a href="cart.html">Корзина <span id="cartCount" class="cart-count">0</span></a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="catalog-layout">
                <aside class="filters-sidebar">
                    <h3>Фильтры</h3>
                    <div class="filter-group">
                        <label>Категория</label>
                        <select id="categoryFilter">
                            <option value="all">Все</option>
                            <option value="pizza">Пицца</option>
                            <option value="burger">Бургеры</option>
                            <option value="sushi">Суши</option>
                            <option value="salad">Салаты</option>
                            <option value="drink">Напитки</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Цена</label>
                        <div class="price-range">
                            <input type="number" id="minPrice" placeholder="От" step="100">
                            <input type="number" id="maxPrice" placeholder="До" step="100">
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Сортировка</label>
                        <select id="sortBy">
                            <option value="name">По названию</option>
                            <option value="price_asc">По возрастанию цены</option>
                            <option value="price_desc">По убыванию цены</option>
                        </select>
                    </div>
                    
                    <button id="applyFilters" class="btn-primary">Применить</button>
                    <button id="resetFilters" class="btn-secondary">Сбросить</button>
                </aside>
                
                <div class="catalog-content">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Поиск блюд...">
                        <button id="searchBtn">🔍</button>
                    </div>
                    <div class="dishes-grid" id="catalogDishes">
                        <!-- Загружается через JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ВкусDelivery. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/catalog.js"></script>
</body>
</html>
