<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ подтвержден - Доставка еды</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>🍕 ВкусDelivery</h1>
                </div>
                <div class="nav-links">
                    <a href="index.html">Главная</a>
                    <a href="catalog.html">Меню</a>
                    <a href="cart.html">Корзина</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="confirmation-container">
                <div class="confirmation-icon">✅</div>
                <h2>Заказ успешно оформлен!</h2>
                <p>Номер вашего заказа: <strong id="orderNumber"></strong></p>
                <p>Статус: <strong id="orderStatus"></strong></p>
                <p>Наш оператор свяжется с вами в ближайшее время для подтверждения заказа.</p>
                <div class="confirmation-actions">
                    <button onclick="location.href='index.html'" class="btn-primary">На главную</button>
                    <button onclick="location.href='catalog.html'" class="btn-secondary">Продолжить покупки</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ВкусDelivery. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/confirmation.js"></script>
</body>
</html>
