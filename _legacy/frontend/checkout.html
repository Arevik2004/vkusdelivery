<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Доставка еды</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>🍕 ВкусDelivery</h1>
                </div>
                <div class="nav-links">
                    <a href="index.html">Главная</a>
                    <a href="catalog.html">Меню</a>
                    <a href="cart.html">Корзина <span id="cartCount" class="cart-count">0</span></a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h2 class="section-title">Оформление заказа</h2>
            <form id="orderForm" class="order-form">
                <div class="form-group">
                    <label for="fullName">ФИО *</label>
                    <input type="text" id="fullName" name="fullName" required>
                    <div class="error-message" id="fullNameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+7 (XXX) XXX-XX-XX" required>
                    <div class="error-message" id="phoneError"></div>
                </div>
                
                <div class="form-group">
                    <label for="address">Адрес доставки *</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                    <div class="error-message" id="addressError"></div>
                </div>
                
                <div class="form-group">
                    <label>Способ оплаты *</label>
                    <div class="payment-methods">
                        <label class="radio-label">
                            <input type="radio" name="paymentMethod" value="card" checked>
                            <span>Банковская карта</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="paymentMethod" value="cash">
                            <span>Наличными курьеру</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="paymentMethod" value="online">
                            <span>Онлайн платеж</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="comment">Комментарий к заказу</label>
                    <textarea id="comment" name="comment" rows="2"></textarea>
                </div>
                
                <div class="order-summary">
                    <h3>Ваш заказ</h3>
                    <div id="orderItemsPreview"></div>
                    <div class="total-preview">
                        <strong>Итого: <span id="orderTotal">0 ₽</span></strong>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Подтвердить заказ</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ВкусDelivery. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
